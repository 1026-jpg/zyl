<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动态爱心</title>
    <style>
        /* 页面基础样式：黑色背景，去除滚动条，居中显示 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* 画布样式 */
        canvas {
            display: block;
        }
		
		
		    /* 定义闪烁动画 */
		    @keyframes blink {
		        0%, 100% { opacity: 3; }
		        50% { opacity: 0; }
		    }
		    
		    /* 你原本其他的 canvas 样式保留... */
		    canvas { display: block; }
		</style>

    </style>
</head>
<body>
    <!-- 绘图区域 -->
    <canvas id="heartCanvas"></canvas>
	<!-- 这是一个定位在屏幕正中间的“大盒子” -->
	<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 999;">
	    
	    <!-- 1. 按钮：默认显示 -->
	    <a href="javascript:void(0) " 
	       id="enterBtn" 
	       onclick="showImage()"
	       style="display: inline-block; padding: 15px 30px; color: white; border-radius: 50px; text-decoration: none; font-size: 30px; font-weight: bold; transition: 0.3s;animation: blink 3s infinite;">
	       领取礼物
	    </a >
	
	    <!-- 2. 图片：默认隐藏 (display:none) -->
	    <div id="giftArea" style="display: none;">
	        <!-- 这里的 src 换成你的图片路径 -->
	        <img src="pop/66.png" style="width: 300px; border-radius: 10px; animation: fadeIn 1s;">
	    </div>
	
	</div>


	

	
    <script>
        // 获取画布和绘图上下文
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布全屏
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 窗口大小改变时重置画布
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 爱心粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                // 随机速度和大小，制造粒子感
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.alpha = 1; // 透明度
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                // 粒子逐渐变小并消失
                if (this.size > 0.2) this.size -= 0.05;
                this.alpha -= 0.01;
            }

            draw() {
                ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        let particles = [];
        let hue = 0; // 颜色色相

        // 爱心形状函数 (数学公式)
        function getHeartPoint(t, scale, offsetX, offsetY) {
            // 标准爱心曲线参数方程
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return {
                x: x * scale + offsetX,
                y: y * scale + offsetY
            };
        }

        function animate() {
            // 使用半透明黑色覆盖上一帧，制造拖尾效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 随着时间变化的缩放比例，制造心跳效果
            let scale = 10 + Math.sin(Date.now() / 500) * 3;

            // 屏幕中心坐标
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;

            // 生成新的粒子
            for (let i = 0; i < 80; i++) {
                let t = Math.random() * Math.PI * 2; // 随机角度
                let point = getHeartPoint(t, scale, centerX, centerY);
                // 粉色系颜色
                let color = `255, 105, 180`;
                particles.push(new Particle(point.x, point.y, color));
            }

            // 更新并绘制所有粒子
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // 移除消失的粒子
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
		
		function showImage() {
		    // 1. 获取按钮和图片的盒子
		    var btn = document.getElementById('enterBtn');
		    var giftBox = document.getElementById('giftArea');
		
		    // 2. 隐藏按钮 (关键：让它彻底消失，不再挡住图片)
		    btn.style.display = 'none';
		
		    // 3. 显示图片
		    giftBox.style.display = 'block';
		}



		
	// 强制等待 2 秒（2000毫秒）后再显示按钮
	setTimeout(function(){
	    var btn = document.getElementById('enterBtn');
	    btn.style.opacity = '1';
	}, 2000); // 这里的 2000 可以改成 3000 或 4000，代表等待的毫秒数
		
    </script>
</body>
</html>
