<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* 禁止滚动 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }
        canvas {
            display: block;
        }
        #instruction {
            position: absolute;
            top: 20px;
            color: #555;
            font-family: sans-serif;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    
    <canvas id="canvas1"></canvas>


<a href="3.html" id="enterBtn"style="opacity: 0;transition:opacity 1s ease-in-out;    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; text-decoration: none; background: rgba(0,0,0,0.5); padding: 10px 20px; border: 1px solid white; z-index: 0;">
    收集粒子
</a >

<script>
    /** @type {HTMLCanvasElement} */
    const canvas = document.getElementById('canvas1');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 粒子数组
    let particlesArray = [];
    let isExploded = false; // 标记是否已经爆炸

    // 处理窗口大小调整
    window.addEventListener('resize', function(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if(!isExploded) init(); // 重置画布时重新初始化文字
    });

    // 鼠标点击事件
    window.addEventListener('click', function(){
        if (!isExploded) {
            explode();
            isExploded = true;
        }
    });

    // 文字配置 (模拟图片中的布局)
    const textsConfig = [
        { text: '7.我拿着卫生纸，哭了好久', x: 0.78, y: 0.60, size: 50, rotate: 0 },
        { text: '6.我就偷偷眯着，直到你推开房门离开', x: 0.32, y: 0.52, size: 50, rotate: 0 },
        { text: '2.趁着母亲节，说句悄悄话', x: 0.3, y: 0.4, size: 65, rotate: 0 },
        { text: '4.其实那次我醒了', x: 0.20, y: 0.25, size: 69, rotate: 0 },
        { text: '3.那年，你去上大学要走了，叫我醒来，我没醒', x: 0.62, y: 0.1, size: 50, rotate: 0 },
        { text: '5.我是接受不了看着你走', x: 0.75, y: 0.25, size: 60, rotate: 0 },
        { text: '1.嗨!老姨', x: 0.8, y: 0.40, size: 80, rotate: 0 },
        { text: '8.您上大学归家总给我带来惊喜', x: 0.730, y: 0.85, size: 55, rotate: 0 },
        { text: '9.现在我也上大学了，我开学的时候你是否也有不舍', x: 0.35, y: 0.95, size: 40, rotate: 0},
        { text: '10这次母亲节，是否也给你带来惊喜?', x: 0.41, y: 0.71, size: 60, rotate: 0 },
    ];

    // 粒子类
    class Particle {
        constructor(x, y, color){
            this.x = x;
            this.y = y;
            this.color = color;
            // 爆炸速度
            this.speed = Math.random() * 10 + 2;
            this.angle = Math.random() * 360 * Math.PI / 180;
            this.vx = Math.cos(this.angle) * this.speed;
            this.vy = Math.sin(this.angle) * this.speed;
            // 重力
            this.gravity = 0.15;
            // 摩擦力/空气阻力
            this.friction = 0.96;
            this.size = 2; // 粒子大小
        }

        update(){
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.vy += this.gravity; // 添加重力下落效果
            this.x += this.vx;
            this.y += this.vy;
            this.size -= 0.05; // 粒子逐渐变小
        }

        draw(){
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        }
    }

    // 初始化：绘制文字
    function init(){
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 40px Arial'; // 默认字体

        textsConfig.forEach(item => {
            const x = canvas.width * item.x;
            const y = canvas.height * item.y;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(item.rotate);
            ctx.font = `bold ${item.size}px "Microsoft YaHei", sans-serif`;
            ctx.fillText(item.text, 0, 0);
            ctx.restore();
        });
    }

    // 爆炸逻辑：将文字转换为粒子
    function explode(){
		setTimeout(function(){
		        var btn = document.getElementById('enterBtn');
		        if(btn){
		            btn.style.opacity = '1'; // 让按钮显示出来
		        }
		    }, 1000); // 这里的 2000 代表 2000毫秒 = 2秒
        // 1. 获取画布像素数据
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        // 调整扫描步长，步长越大粒子越少但性能越好，步长越小粒子越细腻
        const gap = 4;

        const pos = ctx.getImageData(0, 0, canvasWidth, canvasHeight);

        // 2. 清空画布，准备绘制粒子动画
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        // 3. 遍历像素点
        for (let y = 0; y < canvasHeight; y += gap){
            for (let x = 0; x < canvasWidth; x += gap){
                // 计算像素在数组中的索引 (rgba四个值为一组)
                const index = (y * canvasWidth + x) * 4;
                const alpha = pos.data[index + 3]; // 获取透明度

                // 如果透明度大于 128 (即不是背景)，则创建粒子
                if (alpha > 128){
                    const r = pos.data[index];
                    const g = pos.data[index + 1];
                    const b = pos.data[index + 2];
                    const color = `rgb(${r},${g},${b})`;

                    particlesArray.push(new Particle(x, y, color));
                }
            }
        }
        animate();
    }

    // 动画循环
    function animate(){
        // 使用半透明黑色填充背景以产生“拖尾”效果，或者用 clearRect 保持清晰
        // ctx.fillStyle = 'rgba(0,0,0,0.1)';
        // ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
	


        for (let i = 0; i < particlesArray.length; i++){
            particlesArray[i].update();
            particlesArray[i].draw();
        }

        // 移除过小的粒子（可选，为了性能）
        // 如果不需要性能优化，可以去掉下面的过滤逻辑，直到粒子飞出屏幕
        if (particlesArray.length > 0) {
            requestAnimationFrame(animate);
        }
    }

    // 启动
    init();
	// 启动动画
	init();
	


</script>




 



</body>
</html>
